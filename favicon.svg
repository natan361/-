<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Navy rounded background -->
  <rect width="32" height="32" rx="6" fill="#0d2553"/>
  <!-- Cargo box -->
  <rect x="1" y="6" width="18" height="15" rx="1.5" fill="#f26522"/>
  <!-- Cab -->
  <rect x="19" y="11" width="11" height="10" rx="1.5" fill="#f26522"/>
  <!-- Windshield -->
  <rect x="20.5" y="12.5" width="7" height="5.5" rx="0.8" fill="#0d2553" opacity="0.55"/>
  <!-- Chassis bar -->
  <rect x="1" y="20" width="29" height="1.5" rx="0" fill="#b84b0f"/>
  <!-- Rear wheel outer -->
  <circle cx="7" cy="24" r="3.5" fill="white"/>
  <circle cx="7" cy="24" r="2" fill="#0d2553"/>
  <circle cx="7" cy="24" r="0.8" fill="white"/>
  <!-- Front wheel outer -->
  <circle cx="25" cy="24" r="3.5" fill="white"/>
  <circle cx="25" cy="24" r="2" fill="#0d2553"/>
  <circle cx="25" cy="24" r="0.8" fill="white"/>
  <!-- Headlight -->
  <rect x="29" y="16" width="2" height="2" rx="0.5" fill="white" opacity="0.85"/>
</svg>
