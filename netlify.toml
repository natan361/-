[build]
  publish = "."

# Google Search Console verification – must be served before any redirect
[[redirects]]
  from   = "/googleaa45a86ea5a94905.html"
  to     = "/googleaa45a86ea5a94905.html"
  status = 200
  force  = true

# Root → Hebrew (redirect)
[[redirects]]
  from = "/"
  to   = "/he"
  status = 301

# Language routes → index.html (rewrite — URL stays as /he, /en, /fr)
[[redirects]]
  from = "/he"
  to   = "/index.html"
  status = 200

[[redirects]]
  from = "/en"
  to   = "/index.html"
  status = 200

[[redirects]]
  from = "/fr"
  to   = "/index.html"
  status = 200
